<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Auth — LLMSchool</title>
<style>
  body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
         max-width: 560px; margin: 80px auto; padding: 0 20px;
         line-height: 1.6; color: #222; background: #fff; text-align: center; }
  h1 { font-size: 22px; margin-bottom: 8px; }
  .muted { color: #666; font-size: 14px; }
  .code-block { font-family: ui-monospace, "SF Mono", Consolas, monospace;
                background: #f4f4f4; padding: 12px 16px; border-radius: 8px;
                margin: 16px auto; word-break: break-all; user-select: all;
                font-size: 13px; max-width: 480px; }
  .btn { display: inline-block; margin-top: 12px; padding: 10px 20px;
         background: #fe2c55; color: #fff; text-decoration: none;
         border-radius: 6px; font-weight: 600; }
  .err { color: #c00; }
</style>
</head>
<body>
<h1 id="title">Connecting to LLMSchool…</h1>
<p class="muted" id="msg">Forwarding the authorization code to your local app.</p>

<div id="manual" style="display:none;">
  <p>If the app didn't pick this up automatically, copy the code below and paste it in LLMSchool:</p>
  <div class="code-block" id="codebox"></div>
  <a href="#" class="btn" id="retry">Try forward again</a>
</div>

<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var code = params.get("code");
  var state = params.get("state") || "";
  var error = params.get("error");
  var errorDescription = params.get("error_description") || "";

  if (error) {
    document.getElementById("title").textContent = "Authorization failed";
    document.getElementById("title").className = "err";
    document.getElementById("msg").textContent = error + ": " + errorDescription;
    return;
  }

  if (!code) {
    document.getElementById("title").textContent = "Missing authorization code";
    document.getElementById("title").className = "err";
    document.getElementById("msg").textContent =
      "Open the LLMSchool app and start the TikTok login flow again.";
    return;
  }

  var localUrl = "http://127.0.0.1:8765/callback?code=" +
                 encodeURIComponent(code) +
                 "&state=" + encodeURIComponent(state);

  function forward() { window.location.replace(localUrl); }

  // Auto-forward immediately.
  forward();

  // Fallback after 1.5s — if local app isn't listening, show manual code.
  setTimeout(function () {
    document.getElementById("title").textContent = "Almost there";
    document.getElementById("msg").textContent =
      "If LLMSchool didn't open automatically, paste this code into the app:";
    document.getElementById("codebox").textContent = code;
    document.getElementById("manual").style.display = "block";
    document.getElementById("retry").href = localUrl;
  }, 1500);
})();
</script>
</body>
</html>
